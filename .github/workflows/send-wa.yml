name: AdMonitor Auto WA

on:
  schedule:
    - cron: '0 0 * * *'    # 07.00 WIB - Laporan rutin
    - cron: '0 4 * * *'    # 11.00 WIB - Laporan rutin
    - cron: '0 8 * * *'    # 15.00 WIB - Laporan rutin
    - cron: '30 11 * * *'  # 18.30 WIB - Laporan rutin
    - cron: '30 14 * * *'  # 21.30 WIB - Laporan rutin
  workflow_dispatch:

jobs:
  send-laporan:
    runs-on: ubuntu-latest
    steps:
      - name: Kirim laporan rutin
        run: |
          RESPONSE=$(curl -s -X POST https://monitoringads.vercel.app/api/send-wa \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Laporan: $RESPONSE"

      - name: Cek budget alert
        run: |
          RESPONSE=$(curl -s -X POST https://monitoringads.vercel.app/api/check-budget \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Budget alert: $RESPONSE"
