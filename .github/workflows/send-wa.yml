name: Send WA Auto

on:
  schedule:
    - cron: '0 0 * * *'    # 07.00 WIB (UTC+7)
    - cron: '0 4 * * *'    # 11.00 WIB
    - cron: '0 8 * * *'    # 15.00 WIB
    - cron: '30 11 * * *'  # 18.30 WIB
    - cron: '30 14 * * *'  # 21.30 WIB
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger send-wa endpoint
        run: |
          RESPONSE=$(curl -s -X POST https://monitoringads.vercel.app/api/send-wa \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "Response: $RESPONSE"
